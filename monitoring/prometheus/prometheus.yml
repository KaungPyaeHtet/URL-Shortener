global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "app"
    static_configs:
      - targets:
          - "app1:5000"
          - "app2:5000"
    metrics_path: "/prom"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
