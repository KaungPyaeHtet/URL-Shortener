name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hackathon_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hackathon_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest -v
